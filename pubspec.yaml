name: tellie
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.19.4 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_swipe_button: ^2.1.1+1
  flutter_spinkit: ^5.2.0
  lottie: ^2.3.2
  connectivity_plus: 7.2.0
  http: ^0.13.6
  http_parser: ^4.0.2
  path: ^1.8.3
  shared_preferences: ^2.2.0
  image_picker: ^0.8.9
  adaptive_action_sheet: ^2.0.2
  sliding_switch: ^1.1.0
  flutter_tts: ^3.7.0
  babstrap_settings_screen: ^0.1.6
  anim_search_bar: ^2.0.3
  scrollable_positioned_list: ^0.3.8
  just_audio: ^0.9.34
  flutter_image_slideshow: ^0.1.6
  video_player: ^2.7.1
  text_to_speech: ^0.2.3
  toggle_switch: ^2.1.0
  panara_dialogs: ^0.1.4
  salomon_bottom_bar: ^3.3.2
  intl: ^0.18.1
  fluttertoast: ^8.2.2
  flutter_share_me: ^1.4.0
  speech_to_text: 7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/newlogo1.png"
  min_sdk_android: 21
  size: 25

flutter:
  uses-material-design: true

  assets:
    - assets/json/
    - assets/images/
    - assets/audio/
    - assets/videos/
    - assets/animals/

  fonts:
    - family: lemon
      fonts:
        - asset: assets/fonts/lemon-Regular.ttf
          style: italic

    - family: play
      fonts:
        - asset: assets/fonts/play-normal.ttf

    - family: zyzol
      fonts:
        - asset: assets/fonts/zyzol.otf
